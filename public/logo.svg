<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 110" role="img" aria-label="Denes Construction logo">
  <title>Denes Construction</title>

  <!-- Back house silhouette (left, lower peak) -->
  <polygon points="55,57 98,14 141,57 141,73 55,73" fill="#1a2238"/>
  <!-- Chimney on back house -->
  <rect x="78" y="10" width="9" height="24" fill="#1a2238"/>

  <!-- Front house silhouette (right, higher peak) -->
  <polygon points="109,57 157,3 205,57 205,73 109,73" fill="#1a2238"/>
  <!-- Window grid in front house body -->
  <rect x="149" y="60" width="16" height="11" fill="white"/>
  <line x1="149" y1="65.5" x2="165" y2="65.5" stroke="#1a2238" stroke-width="1.5"/>
  <line x1="157" y1="60" x2="157" y2="71" stroke="#1a2238" stroke-width="1.5"/>

  <!-- DENES — serif display -->
  <text
    x="130" y="96"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#1a2238"
    text-anchor="middle"
    letter-spacing="3"
  >DENES</text>

  <!-- CONSTRUCTION — light tracked caps -->
  <text
    x="130" y="109"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="4"
  >CONSTRUCTION</text>
</svg>
